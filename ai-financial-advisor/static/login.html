<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Financial Advisor · Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #21253a;
      --border: #2e3250;
      --accent: #4f8ef7;
      --green: #4caf50;
      --red: #f44336;
      --text: #e8eaf6;
      --muted: #8892b0;
      --radius: 14px;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand .logo { font-size: 48px; }
    .brand h1 { font-size: 1.5rem; font-weight: 700; color: var(--accent); margin-top: 8px; }
    .brand p  { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      width: 100%;
      max-width: 420px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--surface);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
    }

    /* Form */
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 0.92rem;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent); }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      background: var(--accent);
      color: #fff;
      margin-top: 4px;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Message */
    .msg {
      display: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 18px;
      font-weight: 500;
    }
    .msg.error   { background: rgba(244,67,54,0.12);  color: var(--red);   border: 1px solid rgba(244,67,54,0.3); }
    .msg.success { background: rgba(76,175,80,0.12);  color: var(--green); border: 1px solid rgba(76,175,80,0.3); }

    /* Password strength */
    .strength-bar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin-top: 6px;
      overflow: hidden;
      display: none;
    }
    .strength-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }
    .strength-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 3px;
      display: none;
    }

    @media (max-width: 480px) {
      .card { padding: 24px 18px; }
      .brand .logo { font-size: 36px; }
      .brand h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<div class="brand">
  <div class="logo">💹</div>
  <h1>AI Financial Advisor</h1>
  <p>Powered by Machine Learning · Real-time Predictions</p>
</div>

<div class="card">
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tabLogin"    onclick="switchTab('login')">Login</button>
    <button class="tab"        id="tabRegister" onclick="switchTab('register')">Register</button>
  </div>

  <!-- Message -->
  <div class="msg" id="msg"></div>

  <!-- Login Form -->
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="l_user" placeholder="Enter your username" autocomplete="username" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="l_pass" placeholder="Enter your password" autocomplete="current-password" required />
    </div>
    <button class="btn" type="submit" id="loginBtn">Login</button>
  </form>

  <!-- Register Form -->
  <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="r_name" placeholder="Enter your full name" autocomplete="name" required />
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="r_user" placeholder="Choose a username" autocomplete="username" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="r_pass" placeholder="Choose a password" autocomplete="new-password"
             oninput="checkStrength(this.value)" required />
      <div class="strength-bar-bg" id="strengthBg">
        <div class="strength-bar-fill" id="strengthFill"></div>
      </div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="r_pass2" placeholder="Repeat your password" autocomplete="new-password" required />
    </div>
    <button class="btn" type="submit" id="registerBtn">Create Account</button>
  </form>
</div>

<script>
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('loginForm').style.display    = isLogin ? 'block' : 'none';
    document.getElementById('registerForm').style.display = isLogin ? 'none'  : 'block';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    hideMsg();
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.style.display = 'block';
  }

  function hideMsg() {
    const el = document.getElementById('msg');
    el.style.display = 'none';
  }

  function checkStrength(val) {
    const bg    = document.getElementById('strengthBg');
    const fill  = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    bg.style.display    = 'block';
    label.style.display = 'block';

    let score = 0;
    if (val.length >= 8)              score++;
    if (/[A-Z]/.test(val))            score++;
    if (/[0-9]/.test(val))            score++;
    if (/[^A-Za-z0-9]/.test(val))     score++;

    const levels = [
      { pct: '25%', color: '#f44336', text: 'Weak' },
      { pct: '50%', color: '#ffa726', text: 'Fair' },
      { pct: '75%', color: '#ffeb3b', text: 'Good' },
      { pct: '100%', color: '#4caf50', text: 'Strong' },
    ];
    const lvl = levels[Math.max(score - 1, 0)];
    fill.style.width      = lvl.pct;
    fill.style.background = lvl.color;
    label.textContent     = lvl.text;
    label.style.color     = lvl.color;
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Logging in…';
    hideMsg();

    const username = document.getElementById('l_user').value.trim();
    const password = document.getElementById('l_pass').value;

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) { showMsg(data.error || 'Login failed', 'error'); return; }
      showMsg('Login successful! Redirecting…', 'success');
      setTimeout(() => window.location.href = '/', 800);
    } catch {
      showMsg('Network error. Please try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Login';
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    const pass  = document.getElementById('r_pass').value;
    const pass2 = document.getElementById('r_pass2').value;

    if (pass !== pass2) { showMsg('Passwords do not match', 'error'); return; }
    if (pass.length < 6) { showMsg('Password must be at least 6 characters', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Creating account…';
    hideMsg();

    const username  = document.getElementById('r_user').value.trim();
    const full_name = document.getElementById('r_name').value.trim();

    try {
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password: pass, full_name }),
      });
      const data = await res.json();
      if (!res.ok) { showMsg(data.error || 'Registration failed', 'error'); return; }
      showMsg('Account created! Switching to login…', 'success');
      setTimeout(() => {
        switchTab('login');
        document.getElementById('l_user').value = username;
      }, 1000);
    } catch {
      showMsg('Network error. Please try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }
</script>
</body>
</html>
