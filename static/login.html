<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Financial Advisor · Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #21253a;
      --border: #2e3250;
      --accent: #4f8ef7;
      --green: #4caf50;
      --red: #f44336;
      --text: #e8eaf6;
      --muted: #8892b0;
      --radius: 14px;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background:
        linear-gradient(
          180deg,
          rgba(15, 17, 23, 0.78) 0%,
          rgba(15, 17, 23, 0.92) 55%,
          rgba(15, 17, 23, 0.98) 100%
        ),
        url("/static/portfolio/images/bg-portfolio.png") center/cover no-repeat;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand .logo {
      width: 88px;
      height: 88px;
      object-fit: contain;
      display: inline-block;
      filter: drop-shadow(0 8px 18px rgba(79, 142, 247, 0.2));
    }
    .brand h1 { font-size: 1.5rem; font-weight: 700; color: var(--accent); margin-top: 8px; }
    .brand p  { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      width: 100%;
      max-width: 420px;
    }

    @media (max-width: 1024px) {
      body { padding: 20px; }
      .brand { margin-bottom: 24px; }
      .card { max-width: 440px; padding: 28px 24px; }
    }

    @media (max-width: 768px) {
      body { padding: 16px; }
      .brand { margin-bottom: 18px; }
      .brand h1 { font-size: 1.3rem; }
      .brand p { font-size: 0.78rem; }
      .card { max-width: 100%; padding: 24px 18px; }
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--surface);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
    }

    /* Form */
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 0.92rem;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent); }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      background: var(--accent);
      color: #fff;
      margin-top: 4px;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Message */
    .msg {
      display: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 18px;
      font-weight: 500;
    }
    .msg.error   { background: rgba(244,67,54,0.12);  color: var(--red);   border: 1px solid rgba(244,67,54,0.3); }
    .msg.success { background: rgba(76,175,80,0.12);  color: var(--green); border: 1px solid rgba(76,175,80,0.3); }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      color: var(--text);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    }
    .modal-content button {
      margin-top: 12px;
      border: none;
      background: var(--accent);
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
    }

    /* Password strength */
    .strength-bar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin-top: 6px;
      overflow: hidden;
      display: none;
    }
    .strength-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }
    .strength-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 3px;
      display: none;
    }

    @media (max-width: 480px) {
      .card { padding: 24px 18px; }
      .brand .logo { width: 72px; height: 72px; }
      .brand h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<div class="brand">
  <img class="logo" src="/static/portfolio/images/logo.png" alt="AI Financial Advisor Logo" />
  <h1>AI Financial Advisor</h1>
  <p>Powered by Machine Learning · Real-time Predictions</p>
</div>

<div class="card">
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tabLogin"    onclick="switchTab('login')">Login</button>
    <button class="tab"        id="tabRegister" onclick="switchTab('register')">Register</button>
  </div>

  <!-- Message -->
  <div class="msg" id="msg"></div>

  <div class="modal-backdrop" id="modal">
    <div class="modal-content">
      <div id="modalText">Password reset successful.</div>
      <button type="button" onclick="hideModal()">OK</button>
    </div>
  </div>

  <!-- Login Form -->
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="l_user" placeholder="Enter your username" autocomplete="username" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="l_pass" placeholder="Enter your password" autocomplete="current-password" required />
    </div>
    <button class="btn" type="submit" id="loginBtn">Login</button>
    <p style="margin: 12px 0 0; font-size: 0.82rem; text-align: center;">
      <a href="javascript:void(0)" onclick="switchTab('reset')" style="color: var(--accent); text-decoration: underline;">Forgot password?</a>
    </p>
  </form>

  <!-- Register Form -->
  <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="r_name" placeholder="Enter your full name" autocomplete="name" required />
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="r_user" placeholder="Choose a username" autocomplete="username" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="r_pass" placeholder="Choose a password" autocomplete="new-password"
             oninput="checkStrength(this.value)" required />
      <div class="strength-bar-bg" id="strengthBg">
        <div class="strength-bar-fill" id="strengthFill"></div>
      </div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="r_pass2" placeholder="Repeat your password" autocomplete="new-password" required />
    </div>
    <button class="btn" type="submit" id="registerBtn">Create Account</button>
  </form>

  <!-- Reset Password Form -->
  <form id="resetForm" style="display:none" onsubmit="handleReset(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="reset_user" placeholder="Enter your username" autocomplete="username" required />
    </div>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="reset_pass" placeholder="Enter new password" autocomplete="new-password" required />
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" id="reset_pass2" placeholder="Confirm new password" autocomplete="new-password" required />
    </div>
    <button class="btn" type="submit" id="resetBtn">Reset Password</button>
    <p style="margin: 12px 0 0; font-size: 0.82rem; text-align: center;">
      <a href="javascript:void(0)" onclick="switchTab('login')" style="color: var(--accent); text-decoration: underline;">Back to login</a>
    </p>
  </form>

</div>

<script>
  function switchTab(tab) {
    const isLogin = tab === 'login';
    const isRegister = tab === 'register';
    const isReset = tab === 'reset';

    document.getElementById('loginForm').style.display    = isLogin ? 'block' : 'none';
    document.getElementById('registerForm').style.display = isRegister ? 'block' : 'none';
    document.getElementById('resetForm').style.display    = isReset ? 'block' : 'none';

    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabRegister').classList.toggle('active', isRegister);
    hideMsg();
  }

  function applyInitialTabFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const tab = (params.get("tab") || "").toLowerCase();
    if (tab === "register") {
      switchTab("register");
    } else if (tab === "reset") {
      switchTab("reset");
    } else {
      switchTab("login");
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.style.display = 'block';
  }

  function hideMsg() {
    const el = document.getElementById('msg');
    el.style.display = 'none';
  }

  function checkStrength(val) {
    const bg    = document.getElementById('strengthBg');
    const fill  = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    bg.style.display    = 'block';
    label.style.display = 'block';

    let score = 0;
    if (val.length >= 8)              score++;
    if (/[A-Z]/.test(val))            score++;
    if (/[0-9]/.test(val))            score++;
    if (/[^A-Za-z0-9]/.test(val))     score++;

    const levels = [
      { pct: '25%', color: '#f44336', text: 'Weak' },
      { pct: '50%', color: '#ffa726', text: 'Fair' },
      { pct: '75%', color: '#ffeb3b', text: 'Good' },
      { pct: '100%', color: '#4caf50', text: 'Strong' },
    ];
    const lvl = levels[Math.max(score - 1, 0)];
    fill.style.width      = lvl.pct;
    fill.style.background = lvl.color;
    label.textContent     = lvl.text;
    label.style.color     = lvl.color;
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Logging in…';
    hideMsg();

    const username = document.getElementById('l_user').value.trim();
    const password = document.getElementById('l_pass').value;

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) { showMsg(data.error || 'Login failed', 'error'); return; }
      showMsg('Login successful! Redirecting…', 'success');
      setTimeout(() => window.location.href = '/dashboard', 800);
    } catch {
      showMsg('Network error. Please try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Login';
    }
  }

  function showModal(text) {
    const modal = document.getElementById('modal');
    document.getElementById('modalText').textContent = text;
    modal.style.display = 'flex';
  }

  function hideModal() {
    const modal = document.getElementById('modal');
    modal.style.display = 'none';
  }

  async function handleReset(e) {
    e.preventDefault();
    const btn = document.getElementById('resetBtn');
    const user = document.getElementById('reset_user').value.trim();
    const pass = document.getElementById('reset_pass').value;
    const pass2 = document.getElementById('reset_pass2').value;

    if (pass !== pass2) { showMsg('Passwords do not match', 'error'); return; }
    if (pass.length < 6) { showMsg('New password must be at least 6 characters', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Resetting…';
    hideMsg();

    try {
      const res = await fetch('/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, new_password: pass }),
      });
      const data = await res.json();
      if (!res.ok) { showMsg(data.error || 'Password reset failed', 'error'); return; }

      // Show modal and then switch to login after user closes / timeout.
      showModal(data.message || 'Password reset successfully');
      setTimeout(() => {
        hideModal();
        switchTab('login');
      }, 1400);

    } catch {
      showMsg('Network error. Please try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Reset Password';
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    const pass  = document.getElementById('r_pass').value;
    const pass2 = document.getElementById('r_pass2').value;

    if (pass !== pass2) { showMsg('Passwords do not match', 'error'); return; }
    if (pass.length < 6) { showMsg('Password must be at least 6 characters', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Creating account…';
    hideMsg();

    const username  = document.getElementById('r_user').value.trim();
    const full_name = document.getElementById('r_name').value.trim();

    try {
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password: pass, full_name }),
      });
      const data = await res.json();
      if (!res.ok) { showMsg(data.error || 'Registration failed', 'error'); return; }
      showMsg('Account created! Switching to login…', 'success');
      setTimeout(() => {
        switchTab('login');
        document.getElementById('l_user').value = username;
      }, 1000);
    } catch {
      showMsg('Network error. Please try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }

  applyInitialTabFromUrl();
</script>
</body>
</html>
